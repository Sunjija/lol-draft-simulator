name: Korean Patch Notes

on:
  schedule:
    - cron: "10 */6 * * *"
  workflow_dispatch:
    inputs:
      force:
        description: "Post the latest Korean patch note even if it was already sent"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  post-korean-patch-notes:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore patch note state
        uses: actions/cache/restore@v4
        with:
          path: .cache/korean_patch_notes_state.json
          key: korean-patch-notes-state-${{ github.run_id }}
          restore-keys: |
            korean-patch-notes-state-

      - name: Post Korean patch note
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_PATCH_NOTES_WEBHOOK_URL }}
        run: |
          args=()
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.force }}" = "true" ]; then
            args+=(--force)
          fi
          python tools/post_korean_patch_notes.py "${args[@]}"

      - name: Save patch note state
        if: success()
        uses: actions/cache/save@v4
        with:
          path: .cache/korean_patch_notes_state.json
          key: korean-patch-notes-state-${{ github.run_id }}
